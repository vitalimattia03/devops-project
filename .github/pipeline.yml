name: CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t devops-app .

      - name: Run container
        run: |
          docker run -d -p 5000:5000 --name test-container devops-app
          sleep 5
          docker ps

      - name: Test API
        run: curl -f http://localhost:5000

      - name: Logs (debug)
        if: failure()
        run: docker logs test-container