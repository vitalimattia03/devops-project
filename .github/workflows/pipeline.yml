name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Build Docker image
        run: docker build -t devops-app .

      - name: Run container
        run: docker run -d -p 5000:5000 devops-app

      - name: Wait for app
        run: |
          for i in {1..10}; do
            curl -f http://localhost:5000 && exit 0
            sleep 2
          done
          exit 1

      - name: Test API
        run: curl -f http://localhost:5000